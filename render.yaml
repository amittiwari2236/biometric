databases:
  - name: outpass_db
    databaseName: outpass_db
    plan: free

services:
  - type: web
    name: student_outpass_system
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.14"
      - key: DATABASE_URL
        fromDatabase:
          name: outpass_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
